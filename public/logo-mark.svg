<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img"
    aria-label="Nowbat icon mark">
    <title>نوبت</title>
    <!-- Rounded square background -->
    <rect width="40" height="40" rx="9" fill="#378ADD" />
    <!-- Clock face circle -->
    <circle cx="20" cy="21" r="10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" />
    <!-- Minute hand: pointing up (12 o'clock) -->
    <line x1="20" y1="21" x2="20" y2="13.5" stroke="white" stroke-width="2" stroke-linecap="round" />
    <!-- Hour hand: pointing to ~10 o'clock (upper-left) -->
    <line x1="20" y1="21" x2="14.3" y2="16.7" stroke="white" stroke-width="2" stroke-linecap="round" />
    <!-- Center dot -->
    <circle cx="20" cy="21" r="1.5" fill="white" />
    <!-- Top tick mark at 12 o'clock position -->
    <line x1="20" y1="11" x2="20" y2="12.5" stroke="white" stroke-width="1.5" stroke-linecap="round" />
</svg>
