<svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg" role="img"
    aria-label="ProNobat wordmark">
    <title>نوبت</title>
    <!-- Icon mark (left side of wordmark in LTR SVG coordinate space) -->
    <!-- In RTL rendering the icon appears on the right, but SVG coords are LTR internally -->
    <g transform="translate(0,0)">
        <rect width="40" height="40" rx="9" fill="#378ADD" />
        <circle cx="20" cy="21" r="10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" />
        <line x1="20" y1="21" x2="20" y2="13.5" stroke="white" stroke-width="2" stroke-linecap="round" />
        <line x1="20" y1="21" x2="14.3" y2="16.7" stroke="white" stroke-width="2" stroke-linecap="round" />
        <circle cx="20" cy="21" r="1.5" fill="white" />
        <line x1="20" y1="11" x2="20" y2="12.5" stroke="white" stroke-width="1.5" stroke-linecap="round" />
    </g>
    <!-- Wordmark text "نوبت" -->
    <!-- direction="ltr" with text-anchor="start" so x=52 is the LEFT edge.
       Persian glyphs render correctly regardless of direction attribute on a single word. -->
    <text x="52" y="26" font-family="'Vazirmatn', 'Tahoma', 'Arial', sans-serif" font-size="22" font-weight="700"
        fill="#378ADD" direction="ltr" text-anchor="start" dominant-baseline="middle">نوبت</text>
</svg>
