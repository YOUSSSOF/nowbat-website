<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img"
    aria-label="Nowbat favicon">
    <title>نوبت</title>
    <!-- Rounded square background -->
    <rect width="32" height="32" rx="7" fill="#378ADD" />
    <!-- Clock face circle -->
    <circle cx="16" cy="17" r="8.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" />
    <!-- Minute hand: pointing up (12 o'clock) -->
    <line x1="16" y1="17" x2="16" y2="10.5" stroke="white" stroke-width="1.8" stroke-linecap="round" />
    <!-- Hour hand: pointing to ~10 o'clock -->
    <line x1="16" y1="17" x2="11.4" y2="13.4" stroke="white" stroke-width="1.8" stroke-linecap="round" />
    <!-- Center dot -->
    <circle cx="16" cy="17" r="1.3" fill="white" />
</svg>
