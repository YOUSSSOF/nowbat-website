<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" fill="none">
    <rect width="600" height="400" rx="8" fill="#0D0D1A" />
    <!-- Background glow -->
    <ellipse cx="300" cy="200" rx="250" ry="160" fill="rgba(55,138,221,0.04)" />
    <!-- Phone frame -->
    <rect x="170" y="20" width="260" height="360" rx="24" fill="#131320" stroke="rgba(255,255,255,0.1)"
        stroke-width="1.5" />
    <!-- Phone notch -->
    <rect x="240" y="28" width="120" height="12" rx="6" fill="#0D0D1A" />
    <!-- Step 1: Service selection -->
    <rect x="190" y="56" width="220" height="60" rx="8" fill="#0A0A17" stroke="rgba(55,138,221,0.3)"
        stroke-width="1.5" />
    <rect x="202" y="66" width="80" height="10" rx="2" fill="#378ADD" opacity="0.8" />
    <rect x="202" y="82" width="120" height="12" rx="3" fill="#F0F0F8" opacity="0.7" />
    <rect x="202" y="100" width="60" height="8" rx="2" fill="#8888AA" opacity="0.5" />
    <!-- Step 2: Staff card row -->
    <rect x="190" y="126" width="100" height="70" rx="8" fill="#131320" stroke="rgba(255,255,255,0.07)"
