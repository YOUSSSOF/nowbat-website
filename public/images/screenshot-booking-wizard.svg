    <rect x="462" y="92" width="70" height="8" rx="2" fill="#8888AA" opacity="0.4" />
    <rect x="462" y="106" width="50" height="10" rx="2" fill="#378ADD" opacity="0.5" />
    <rect x="450" y="150" width="130" height="50" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)"
