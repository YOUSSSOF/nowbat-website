    <rect x="358" y="216" width="40" height="12" rx="2" fill="#8888AA" opacity="0.4" />
    <!-- Calendar grid -->
    <rect x="202" y="234" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="228" y="234" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="254" y="234" width="20" height="20" rx="3" fill="#378ADD" opacity="0.8" />
    <rect x="280" y="234" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="306" y="234" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="332" y="234" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="358" y="234" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="202" y="260" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="228" y="260" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="254" y="260" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="280" y="260" width="20" height="20" rx="3" fill="#1D9E75" opacity="0.6" />
    <rect x="306" y="260" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="332" y="260" width="20" height="20" rx="3" fill="#0A0A17" />
    <rect x="358" y="260" width="20" height="20" rx="3" fill="#E9A526" opacity="0.4" />
    <!-- Step 4: Confirm button -->
    <rect x="190" y="308" width="220" height="44" rx="8" fill="#378ADD" />
    <rect x="260" y="322" width="80" height="16" rx="3" fill="white" opacity="0.9" />
    <!-- Progress dots -->
    <circle cx="274" cy="368" r="5" fill="#378ADD" />
    <circle cx="290" cy="368" r="4" fill="rgba(255,255,255,0.2)" />
    <circle cx="306" cy="368" r="4" fill="rgba(255,255,255,0.2)" />
    <circle cx="322" cy="368" r="4" fill="rgba(255,255,255,0.2)" />
