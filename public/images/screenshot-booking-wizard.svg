    <rect x="32" y="92" width="60" height="8" rx="2" fill="#8888AA" opacity="0.4" />
    <rect x="32" y="106" width="80" height="12" rx="3" fill="#F0F0F8" opacity="0.5" />
    <rect x="32" y="124" width="40" height="8" rx="2" fill="#1D9E75" opacity="0.5" />
    <rect x="20" y="180" width="130" height="80" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)"
