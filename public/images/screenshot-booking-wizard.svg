    <circle cx="240" cy="148" r="14" fill="#378ADD" opacity="0.2" />
    <rect x="226" y="144" width="28" height="8" rx="2" fill="#378ADD" opacity="0.5" />
    <rect x="210" y="166" width="60" height="8" rx="2" fill="#F0F0F8" opacity="0.5" />
    <rect x="218" y="180" width="44" height="6" rx="2" fill="#8888AA" opacity="0.4" />
    <rect x="298" y="126" width="100" height="70" rx="8" fill="#0A0A17" stroke="rgba(55,138,221,0.3)"
        stroke-width="1.5" />
    <circle cx="348" cy="148" r="14" fill="#1D9E75" opacity="0.2" />
    <rect x="334" y="144" width="28" height="8" rx="2" fill="#1D9E75" opacity="0.5" />
    <rect x="318" y="166" width="60" height="8" rx="2" fill="#F0F0F8" opacity="0.7" />
    <rect x="326" y="180" width="44" height="6" rx="2" fill="#1D9E75" opacity="0.5" />
