    <rect x="32" y="192" width="50" height="8" rx="2" fill="#8888AA" opacity="0.4" />
    <rect x="32" y="206" width="70" height="12" rx="3" fill="#F0F0F8" opacity="0.5" />
    <rect x="32" y="224" width="55" height="8" rx="2" fill="#E9A526" opacity="0.5" />
