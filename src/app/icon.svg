<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img"
    aria-label="ProNobat favicon">
    <title>ProNobat</title>
    <!-- Blue rounded square background -->
    <rect width="32" height="32" rx="6" fill="#378ADD" />
    <!-- Calendar border -->
    <rect x="4" y="8" width="24" height="20" rx="2.5" fill="none" stroke="white" stroke-width="1.6"/>
    <!-- Header separator -->
    <line x1="4" y1="15" x2="28" y2="15" stroke="white" stroke-width="1.6"/>
    <!-- Knob left -->
    <line x1="11" y1="4" x2="11" y2="11" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Knob right -->
    <line x1="21" y1="4" x2="21" y2="11" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Highlighted cell -->
    <rect x="9" y="18" width="5" height="5" rx="1" fill="white"/>
</svg>
